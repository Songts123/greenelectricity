<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>园区综合能源系统低碳调度经济评估软件 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#e6f7ff',
                            100: '#b3e7ff',
                            200: '#80d7ff',
                            300: '#4dc7ff',
                            400: '#26b8ff',
                            500: '#0099ff',
                            600: '#007acc',
                            700: '#005c99',
                            800: '#003d66',
                            900: '#001f33',
                        },
                        dark: {
                            100: '#1e293b',
                            200: '#1a2332',
                            300: '#151c2a',
                            400: '#111827',
                            500: '#0d1421',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }
        
        .login-container {
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-card {
            animation: slideUp 0.6s ease-out 0.2s both;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group input {
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            box-shadow: 0 0 0 3px rgba(0, 153, 255, 0.3);
        }
        
        .btn-login {
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 153, 255, 0.5);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .error-message {
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        
        .password-toggle {
            transition: color 0.3s ease;
        }
        
        .password-toggle:hover {
            color: #0099ff;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="login-container w-full max-w-md">
        <div class="text-center mb-8 login-card">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-primary-500 to-cyan-500 mb-6 shadow-lg">
                <i class="fas fa-leaf text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">园区综合能源系统</h1>
            <p class="text-gray-400 text-lg">低碳调度经济评估平台</p>
        </div>
        
        <div class="bg-dark-200 rounded-2xl p-8 shadow-2xl login-card">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">
                <i class="fas fa-user-circle mr-2 text-primary-500"></i>用户登录
            </h2>
            
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="space-y-5">
                    <div class="input-group">
                        <label class="block text-gray-300 text-sm font-medium mb-2" for="username">
                            <i class="fas fa-user mr-2 text-primary-500"></i>账号
                        </label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username"
                            class="w-full px-4 py-3 bg-dark-300 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-primary-500"
                            placeholder="请输入账号"
                            required
                            autocomplete="username"
                        >
                    </div>
                    
                    <div class="input-group">
                        <label class="block text-gray-300 text-sm font-medium mb-2" for="password">
                            <i class="fas fa-lock mr-2 text-primary-500"></i>密码
                        </label>
                        <div class="relative">
                            <input 
                                type="password" 
                                id="password" 
                                name="password"
                                class="w-full px-4 py-3 bg-dark-300 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 pr-12"
                                placeholder="请输入密码"
                                required
                                autocomplete="current-password"
                            >
                            <button 
                                type="button"
                                onclick="togglePassword()"
                                class="password-toggle absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 focus:outline-none"
                            >
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div id="errorMsg" class="hidden error-message bg-red-500/20 border border-red-500/50 rounded-lg p-3 text-red-400 text-sm">
                        <i class="fas fa-exclamation-circle mr-2"></i>
                        <span id="errorText"></span>
                    </div>
                    
                    <button 
                        type="submit" 
                        class="btn-login w-full bg-gradient-to-r from-primary-500 to-cyan-500 hover:from-primary-600 hover:to-cyan-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg flex items-center justify-center"
                    >
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        登录
                    </button>
                </div>
            </form>
            
            <div class="mt-6 text-center text-gray-500 text-sm">
                <p>仅限授权用户访问</p>
            </div>
        </div>
        
        <div class="text-center mt-6 text-gray-500 text-sm login-card">
            <p>© 2026 园区综合能源系统低碳调度经济评估平台</p>
        </div>
    </div>

    <script>
        const USERS = {
            'Songts': 'test1234',
            'Lxr': '123'
        };
        const TARGET_PAGE = 'index_V16.html';
        
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }
        
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            
            errorMsg.classList.add('hidden');
            
            if (!username) {
                showError('请输入账号');
                return false;
            }
            
            if (!password) {
                showError('请输入密码');
                return false;
            }
            
            if (USERS[username] && USERS[username] === password) {
                window.location.href = TARGET_PAGE;
                return false;
            } else {
                showError('账号或密码错误，请重试');
                return false;
            }
        }
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorMsg.classList.remove('hidden');
        }
        
        document.getElementById('username').addEventListener('input', function() {
            document.getElementById('errorMsg').classList.add('hidden');
        });
        
        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('errorMsg').classList.add('hidden');
        });
    </script>
</body>
</html>
